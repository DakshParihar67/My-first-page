<!DOCTYPE html>
<html lang="en">
<head>
    <title>My first page</title>
    <style>
            body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(270deg, #e20909, #ffffff, #192c60);
    background-size: 600% 600%;
    animation: gradientMove 8s ease infinite;
    color: rgb(229, 255, 0);
    text-align: center;
    font-family: Arial;
        }
        @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
        }

        button{
            padding: 15px;
            font-size: 18px;
            background-color:rgb(0, 251, 255);
            border-color: aqua;
            cursor:pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color:white;
            color:black;
        }
        h1 {
    font-size: 50px;
    text-shadow: 0 0 10px cyan, 0 0 20px cyan;
}
button:hover {
    transform: scale(1.1);
}
    </style>
</head>
<body>
    <div id="main">
        <h1 id="typing"></h1>
        <p>wanna know how i did this</p>

        <button onclick ="showMessage()">What's up!!</button>
    </div>
    <script>
        let text = "Welcome to my First page 🚀";
        let i = 0;

        function typeffect(){
            if(i<text.length){
                document.getElementById("typing").innerHTML += text.charAt(i);
                i++
                setTimeout(typeffect,100);
            }
        }

        typeffect();

        function showMessage()
        {
            alert("Is this TS tuff??😎")
        }
    </script>
</body>
</html>
