<!DOCTYPE html>
<html lang="en">
<head>
    <title>My first page</title>
    <style>
            body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(270deg, #e20909, #ffffff, #192c60);
    background-size: 600% 600%;
    animation: gradientMove 8s ease infinite;
    color: rgb(229, 255, 0);
    text-align: center;
    font-family: Arial;
        }
        @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
        }
        .section {
    padding: 80px;
    text-align: center;
}

.section h2 {
    font-size: 35px;
    margin-bottom: 20px;
}

.section p, .section ul {
    font-size: 18px;
}

.section ul {
    list-style: none;
}

.footer {
    padding: 20px;
    background: black;
    color: white;
}
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: black;
    padding: 10px;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
}
html {
    scroll-behavior: smooth;
}

        button{
            padding: 15px;
            font-size: 18px;
            background-color:rgb(0, 251, 255);
            border-color: aqua;
            cursor:pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color:white;
            color:black;
        }
        h1 {
    font-size: 50px;
    text-shadow: 0 0 10px cyan, 0 0 20px cyan;
}
button:hover {
    transform: scale(1.1);
}
    </style>
</head>
<body>
    <nav>
    <a href="#main">Home</a>
    <a href="#about">About</a>
    <a href="#features">Features</a>
</nav>
    <div id="main">
    <h1 id="typing"></h1>
    <p>This is my first interactive website</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <h2>About Me</h2>
    <p>I’m learning frontend development and building cool stuff 😎</p>
</div>

<!-- FEATURES -->
<div id="features" class="section">
    <h2>Features</h2>
    <ul>
        <li>🔥 Animated Background</li>
        <li>⚡ Typing Effect</li>
        <li>🎯 Interactive Button</li>
    </ul>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>Made by Daksh 🚀</p>
</div>
<script>
function showMessage() {
    alert("You clicked the button 😎");
}
</script>
</body>
</html>
